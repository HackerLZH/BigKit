<!DOCTYPE html>
<html>
<head>
    <title>图片上传接口测试</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="file"] { padding: 5px; }
        input[type="text"] { width: 300px; padding: 8px; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; }
        pre { background-color: #f8f9fa; padding: 10px; overflow-x: auto; }
        .success { border-color: #28a745; }
        .error { border-color: #dc3545; }
    </style>
</head>
<body>
    <h1>图片上传接口测试</h1>
    
    <form id="uploadForm">
        <div class="form-group">
            <label for="fileInput">选择图片文件:</label>
            <input type="file" id="fileInput" name="files" multiple accept="image/*" required>
            <small>支持 JPG, PNG, GIF, BMP, WebP 格式</small>
        </div>
        
        <div class="form-group">
            <label for="sessionId">会话ID (可选):</label>
            <input type="text" id="sessionId" name="sessionId" placeholder="留空则自动创建新会话">
            <small>如果不提供，系统会自动创建新的会话</small>
        </div>
        
        <button type="submit">上传图片</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const fileInput = document.getElementById('fileInput');
            const sessionId = document.getElementById('sessionId').value;
            const resultDiv = document.getElementById('result');
            
            // 添加文件
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }
            
            // 添加会话ID（如果有）
            if (sessionId.trim()) {
                formData.append('sessionId', sessionId.trim());
            }
            
            // 显示加载状态
            resultDiv.innerHTML = '<p>正在上传...</p>';
            resultDiv.className = '';
            
            try {
                // 发送请求
                const response = await fetch('http://localhost:8080/api/images/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                // 显示结果
                resultDiv.innerHTML = 
                    `<h3>上传结果:</h3>
                     <pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                resultDiv.className = data.success ? 'success' : 'error';
                
                // 如果上传成功，显示文件位置
                if (data.success && data.uploadedFiles) {
                    resultDiv.innerHTML += `
                        <h4>上传的文件:</h4>
                        <ul>
                            ${data.uploadedFiles.map(file => `<li>${file}</li>`).join('')}
                        </ul>
                        <p><strong>会话ID:</strong> ${data.sessionId}</p>
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = 
                    `<h3>错误:</h3>
                     <p style="color: red;">${error.message}</p>
                     <p>请确保应用已在 localhost:8080 启动</p>`;
                resultDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
